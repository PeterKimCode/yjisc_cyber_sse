<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>동영상 강의 | GTCC</title>
    <link rel="icon" type="image/png" href="assets/icons/gtcc.png" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div data-include="assets/partials/header.html"></div>
    
    <main class="content-page">
        <section class="page-hero">
            <div class="container">
                <span class="page-category">동영상강의</span>
                <h1>동영상강의</h1>
                <p>교수님들의 동영상강의를 다운로드 하실수 있습니다.</p>
            </div>
        </section>

        <div class="subject-container">
            <article>
                <div class="subject-header">
                    <h1>교과목 강의</h1>
                    <div class="header-line"></div>
                    <p>항목을 클릭하면 해당 교수님의 교과목 강의를 다운로드하실 수 있습니다.</p>
                </div>

                <div class="professor-wrapper">
                    <div id="prof-grid" class="professor-grid">
                        </div>
                </div>
            </article>
        </div>
    </main>

    <div data-include="assets/partials/footer.html"></div>

    <style>
        /* 1. 전체 컨테이너 및 중앙 정렬 */
        .subject-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 2. 연푸른색 제목 섹션 디자인 */
        .subject-header {
            text-align: center;
            background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%); 
            border: 1px solid #e1e8f0;
            border-radius: 15px;
            padding: 50px 20px;
            margin-bottom: 50px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
        }

        .subject-header h1 {
            font-size: 2.2rem;
            color: #1a202c;
            margin: 0;
            font-weight: 700;
        }

        .header-line {
            width: 50px;
            height: 4px;
            background: #0056b3;
            margin: 15px auto;
            border-radius: 10px;
        }

        .subject-header p {
            color: #4a5568;
            font-size: 1.1rem;
            margin: 0;
            opacity: 0.8;
        }

        /* 3. 교수님 그리드 레이아웃 */
        .professor-wrapper { display: flex; justify-content: center; width: 100%; }
        .professor-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 20px 12px;
            width: 100%;
        }

        /* 4. 교수님 버튼 디자인 */
        .lecture-btn {
            width: 100%;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-top: 5px solid #0056b3;
            padding: 20px 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .prof-name { font-size: 16px; font-weight: 700; color: #2d3748; }
        .lecture-btn .arrow { font-size: 12px; color: #a0aec0; }

        .lecture-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            background-color: #f8faff;
        }

        .lecture-btn.active {
            background: #0056b3;
        }
        .lecture-btn.active .prof-name, .lecture-btn.active .arrow { color: #fff; }

        /* 드롭다운 리스트 스타일 */
        .link-list {
            display: none;
            list-style: none;
            padding: 8px;
            margin-top: 10px;
            background-color: #fff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            position: absolute;
            width: 200px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            border-radius: 12px;
            max-height: 250px;
            overflow-y: auto;
        }
        .link-list.show { display: block; }
        .link-list li a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: #4a5568;
            font-size: 13px;
        }
        .link-list li a:hover { background: #ebf4ff; color: #0056b3; }

        /* 반응형 */
        @media (max-width: 1024px) { .professor-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .professor-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>

    <script>
        const professorData = [
            { name: "김동수교수", videos: Array(5).fill("https://www.youtube.com") },
            { name: "최세라교수", videos: Array(5).fill("https://www.youtube.com") },
            { name: "이광재교수", videos: Array(5).fill("https://www.youtube.com") },
            { name: "김낙신교수", videos: ["https://www.youtube.com/watch?v=EV4kxB7-bt4","https://www.youtube.com/watch?v=N745IVRRSQ4","https://www.youtube.com/watch?v=H-2kFomhunY", 
                              "https://www.youtube.com/watch?v=VlJh7zLdqgs", "https://www.youtube.com/watch?v=HP8MuJMF_FE", "https://www.youtube.com/watch?v=7UEe4_DM_TI", 
                              "https://www.youtube.com/watch?v=KBqCaYVBf94", "https://www.youtube.com/watch?v=OUe_JRcO3QY", "https://www.youtube.com/watch?v=KBqCaYVBf94", 
                              "https://www.youtube.com/watch?v=XnvKlPp61rA", "https://www.youtube.com/watch?v=GP5tYYXJeUM", "https://www.youtube.com/watch?v=5lr49fb_g9Y", 
                              "https://www.youtube.com/watch?v=uGT-p14EmK0", "https://www.youtube.com/watch?v=w5yROH52VBk", "https://www.youtube.com/watch?v=5EyFGu69jn8"] },
            { name: "김동수교수", videos:  ["https://www.youtube.com/watch?v=EV4kxB7-bt4","https://www.youtube.com/watch?v=N745IVRRSQ4","https://www.youtube.com/watch?v=H-2kFomhunY", 
                              "https://www.youtube.com/watch?v=VlJh7zLdqgs", "https://www.youtube.com/watch?v=HP8MuJMF_FE", "https://www.youtube.com/watch?v=7UEe4_DM_TI", 
                              "https://www.youtube.com/watch?v=KBqCaYVBf94", "https://www.youtube.com/watch?v=OUe_JRcO3QY", "https://www.youtube.com/watch?v=KBqCaYVBf94", 
                              "https://www.youtube.com/watch?v=XnvKlPp61rA", "https://www.youtube.com/watch?v=GP5tYYXJeUM", "https://www.youtube.com/watch?v=5lr49fb_g9Y", 
                              "https://www.youtube.com/watch?v=uGT-p14EmK0", "https://www.youtube.com/watch?v=w5yROH52VBk", "https://www.youtube.com/watch?v=5EyFGu69jn8"] },
            { name: "김동수교수", videos: Array(5).fill("https://www.youtube.com") },
            { name: "김동수교수", videos: Array(5).fill("https://www.youtube.com") },
            { name: "김동수수",   videos: Array(5).fill("https://www.youtube.com") },
            { name: "김동수교수", videos: Array(5).fill("https://www.youtube.com") },
            { name: "김동수교수", videos: Array(5).fill("https://www.youtube.com") },
            { name: "김동수교수", videos: Array(5).fill("https://www.youtube.com") },
            { name: "강호직교수", videos: Array(5).fill("https://www.youtube.com") }
        ];

        const grid = document.getElementById('prof-grid');

        professorData.forEach((prof, pIdx) => {
            const item = document.createElement('div');
            item.style.position = 'relative';
            
            let listHtml = '';
            prof.videos.forEach((url, vIdx) => {
                listHtml += `<li><a href="${url}" target="_blank">▶ 제${vIdx + 1}강 보기</a></li>`;
            });

            item.innerHTML = `
                <button type="button" class="lecture-btn" onclick="toggleList('list${pIdx}', this)">
                    <span class="prof-name">${prof.name}</span>
                    <span class="arrow">▼</span>
                </button>
                <ul id="list${pIdx}" class="link-list">
                    ${listHtml}
                </ul>
            `;
            grid.appendChild(item);
        });

        function toggleList(listId, btn) {
            const list = document.getElementById(listId);
            const isVisible = list.classList.contains('show');

            document.querySelectorAll('.link-list').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.lecture-btn').forEach(el => el.classList.remove('active'));

            if (!isVisible) {
                list.classList.add('show');
                btn.classList.add('active');
            }
        }
    </script>
    <script src="assets/js/includes.js" defer></script>
    <script src="assets/js/main.js" defer></script>
</body>
</html>
